<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home — Glider</title>
    
    <link rel="stylesheet" href="../LandingPage/CSS/style.css">
    <link rel="stylesheet" href="./home.css">
    <link rel="stylesheet" href="./Content/dropdown.css">
    <link rel="stylesheet" href="../components/sidebar.css">

    <script type="module" src="./home.js"></script>
</head>
<body>
    <header class="no-select">
        <div class="header-left">
            <button class="sidebar-btn" id="sidebarToggle">☰</button> 
            <h1 id="siteTitle" class="logo" onclick="window.location.href='home.html'">Glider</h1>
        </div>
    </header>
    <main style="width: 100%; max-width: 1200px; padding: 0 20px;">
        <div class="hero-search-section">
            <h2 class="welcome-text no-select">What do you want to learn today?</h2>
            
            <div class="main-search-bar">
                <div class="filter-wrapper">
                    <button id="filterToggle" class="filter-btn">
                    <span>Filters</span>
                    <span style="font-size: 0.8em;">▼</span> 
                    </button>
                    
                    <div id="filterDropdown" class="filter-dropdown">
                        <label><input type="checkbox" id="filterAll" checked> <span>All</span></label>
                        <div class="divider"></div>
                        <label><input type="checkbox" class="filter-opt" value="decks"> <span>Decks</span></label>
                        <label><input type="checkbox" class="filter-opt" value="flashcards"> <span>Flashcards</span></label>
                        <label><input type="checkbox" class="filter-opt" value="tags"> <span>Tags</span></label>
                    </div>
                </div>
                <div id="searchResults" class="results-dropdown"></div>
                <input type="text" id="searchInput" placeholder="Search for decks, flashcards, or topics...">
                
                <button id="searchActionBtn" class="search-btn-primary">Search</button>
            </div>
        </div>

        <div id="recentlyviewedContainer">
            </div>

</main>
        <div id="recentlyviewedContainer">
            <h2 class="no-select">Recently Viewed</h2>
            
            <div id="recentList" class="recently-viewed-list">
                <p class="empty-msg no-select">You haven't viewed any decks yet.</p>
            </div>
        </div>
        
        <div id="recommendedContainer">
            <h2 class="no-select">Recommended For You</h2>
            <p class="subtitle no-select">Based on your interests</p>
            
            <div id="recommendedList" class="recommended-list">
                <div class="loading-spinner no-select">Loading decks...</div>
            </div>
        </div>
        
        <div id="ToBeDefined">
            <h2 class="no-select">Your Activity</h2>
            <div class="stats-grid">
                <div class="stat-card no-select">
                    <h3>0</h3>
                    <p>Decks Created</p>
                </div>
                <div class="stat-card no-select">
                    <h3>0</h3>
                    <p>Cards Mastered</p>
                </div>
            </div>
            
            <div style="margin-top: 20px; opacity: 0.5; font-size: 0.9em;">
                <p class="no-select">Followers and Notifications coming soon...</p>
            </div>
        </div>

    </main>

</body>
</html>
