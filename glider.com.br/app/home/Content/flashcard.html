<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard View — Glider</title>
    
    <link rel="stylesheet" href="../../LandingPage/CSS/style.css">
    <link rel="stylesheet" href="flashcard.css">
    <link rel="stylesheet" href="../home.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="no-select">
        <div class="header-left">
            <button class="sidebar-btn" id="sidebarToggle">☰</button> 
            <h1 id="siteTitle" class="logo" onclick="window.location.href='../home.html'">Glider</h1>
        </div>
    </header>
    <div class="page-content">
        
        <div class="card-viewer-container">
            
            <div class="top-nav no-select">
                <button id="backBtn" class="nav-link">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </button>
            </div>

            <div class="flashcard-display shadow-lg">
                
                <div id="imageContainer" class="fc-image-area no-select" style="display: none;">
                    <img id="cardImage" src="" alt="Flashcard Image">
                </div>

                <div class="fc-content">
                    <div id="cardTags" class="tags-container no-select">
                        </div>

                    <h2 class="fc-label no-select">QUESTION</h2>
                    <div id="cardQuestion" class="fc-question-text">Loading...</div>
                </div>

                <div class="fc-divider no-select"></div>

                <div class="fc-content">
                    <h2 class="fc-label no-select">OPTIONS</h2>
                    <div id="answersGrid" class="answers-grid"></div>
                </div>
            </div>

            <div class="action-area no-select">
                <button id="downloadCardBtn" class="btn-spotify-primary">
                    <i class="fa-solid fa-download"></i> Download Card JSON
                </button>
            </div>

        </div>
    </div>

    <script type="module" src="flashcard.js"></script>
</body>
</html>
