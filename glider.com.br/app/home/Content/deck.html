<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deck View — Glider</title>
    
    <link rel="stylesheet" href="../../LandingPage/CSS/style.css ">
    <link rel="stylesheet" href="deck.css">
    <link rel="stylesheet" href="../home.css">
    <link rel="stylesheet" href="../../components/sidebar.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <body>
        <header class="no-select">
            <div class="header-left">
                <button class="sidebar-btn" id="sidebarToggle">☰</button> 
                <h1 id="siteTitle" class="logo" onclick="window.location.href='../home.html'">Glider</h1>
            </div>
        </header>
   
    <div class="page-content">
        
        <div class="deck-header-section">
            <div class="deck-info-container">
                <div class="deck-cover shadow-lg no-select">
                    <img id="deckCover" src="" alt="Deck Cover" onerror="this.style.display='none'">
                    <div id="deckCoverFallback" class="cover-fallback"></div>
                </div>
                
                <div class="deck-text">
                    <span class="deck-label no-select">DECK</span>
                    <h1 id="deckTitle" class="no-select">Loading...</h1>
                    <p id="deckDescription" class="deck-desc no-select">...</p>
                    
                    <div class="deck-meta no-select">
                        <div style="display:flex; align-items:center; gap:8px;">
                            <img id="creatorAvatar" src="" class="mini-avatar" onerror="this.style.display='none'">
                            Created by <span id="creatorName" class="highlight-text">Unknown</span>
                        </div>
                        <span class="dot-separator">•</span>
                        <span id="cardCount">0 Cards</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="action-bar no-select">
            <button id="studyBtn" class="btn-spotify-primary">
                <i class="fa-solid fa-play"></i> Study Now
            </button>
            
            <div id="ownerControls" style="display: none; align-items:center; gap: 15px;">
                <button id="editDeckBtn" class="btn-secondary-icon" title="Edit Deck"><i class="fa-solid fa-pen"></i></button>
                <button id="deleteDeckBtn" class="btn-secondary-icon danger" title="Delete Deck"><i class="fa-solid fa-trash"></i></button>
            </div>
        </div>

        <div class="content-section">
            <h2 class="section-title no-select">Flashcards in this deck</h2>
            
            <div id="cardsList" class="cards-list-container">
                <div class="loading-spinner no-select">Loading cards...</div>
            </div>
        </div>

    </div>

    <script type="module" src="./deck.js"></script>
</body>
</html>
