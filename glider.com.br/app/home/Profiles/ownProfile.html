<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile — Glider</title>
    
    <link rel="stylesheet" href="../../LandingPage/CSS/style.css">
    <link rel="stylesheet" href="viewProfile.css">
    <link rel="stylesheet" href="ownProfile.css">
    <link rel="stylesheet" href="../home.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="no-select">
        <div class="header-left">
            <button class="sidebar-btn" id="sidebarToggle">☰</button> 
            <h1 id="siteTitle" class="logo" onclick="window.location.href='../home.html'">Glider</h1>
        </div>
    </header>

    <div class="page-content">
        
        <div class="profile-header-section">
            <div class="profile-info-container">
                
                <div class="profile-avatar-wrapper no-select">
                    <div class="profile-avatar" id="avatarContainer">
                        <img id="profileImage" src="" alt="Profile" onerror="this.src='https://via.placeholder.com/250'">
                        
                        <div class="avatar-overlay">
                            <i class="fa-solid fa-camera"></i>
                            <span>Change</span>
                        </div>
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                </div>
                
                <div class="profile-text">
                    <span class="profile-label no-select">EDIT PROFILE</span>
                    
                    <input type="text" id="usernameInput" class="edit-h1-input" placeholder="Your Name" autocomplete="off" spellcheck="false">
                    
                    <div class="profile-stats no-select" style="margin-top: 10px;">
                        <span id="emailDisplay" style="opacity: 0.7;">loading...</span>
                    </div>
                    
                    <div id="statusMessage" class="status-msg no-select"></div>
                </div>
            </div>
        </div>

        <div class="action-bar no-select">
            <button id="saveBtn" class="btn-spotify-primary">Save Changes</button>
            <button id="cancelBtn" class="btn-secondary-spotify">Cancel</button>
        </div>

        <div class="content-section">
            <div style="display:flex; align-items:center; gap:20px; margin-bottom: 20px;">
                <h2 class="section-title no-select" style="margin-bottom:0; border:none;">My Decks</h2>
                
                <div class="deck-tabs no-select">
                    <button class="tab-btn active" data-filter="all">All</button>
                    <button class="tab-btn" data-filter="public">Public</button>
                    <button class="tab-btn" data-filter="private">Private</button>
                </div>
            </div>
            
            <div id="myDecksList" class="decks-grid">
                <div class="loading-spinner no-select">Loading your library...</div>
            </div>
        </div>

    </div>

    <script type="module" src="ownProfile.js"></script>
</body>
</html>
