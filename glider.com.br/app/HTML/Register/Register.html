<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../LandingPage/CSS/style.css">
    <title>Glider</title>
</head>
<body>
    <header><a href="../index.html" id="siteTitle"><h1>Glider</h1></a></header>

    <div id="credentialsContainer" style="max-width: 420px; margin: 40px auto;">

        <hr>
        <h2>Register</h2>
        <div class="input-group">
            <label for="usernameField"><b>Username</b></label>
            <input type="text" id="usernameField" placeholder="Insert your username here">
        </div>

        <div class="input-group">
            <label for="emailField"><b>Email</b></label>
            <input type="email" id="emailField" placeholder="Insert your email here">
        </div>

        <div class="input-group">
            <label for="passwordField"><b>Password</b></label>
            <input type="password" id="passwordField" placeholder="Insert your password here">
        </div>
        <h3 style="font-size: 14px; margin-top: 20px;">Already have an account? <a href="Login.html">Log in here</a></h3>
        <hr>

        <button id="registerbtn" class="btn-primary">Register</button>

    </div>
    
</body>
<script type="module" src="./Register.js"></script>
</html>
