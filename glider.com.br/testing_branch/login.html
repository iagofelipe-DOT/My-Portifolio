<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards Login</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: 0 auto; }
        .hidden { display: none; }
        .box { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; }
        input { display: block; margin-bottom: 10px; width: 100%; padding: 8px; box-sizing: border-box; }
        button { cursor: pointer; padding: 10px 20px; background-color: #2a9d8f; color: white; border: none; border-radius: 4px; }
        button.secondary { background-color: #e76f51; }
    </style>
</head>
<body>

    <h1>App de Flashcards</h1>

    <div id="auth-container">
        
        <div id="login-form" class="box">
            <h2>Entrar</h2>
            <input type="email" id="login-email" placeholder="Seu email">
            <input type="password" id="login-password" placeholder="Sua senha">
            <button onclick="fazerLogin()">Entrar</button>
            <p>Não tem conta? <a href="#" onclick="toggleForms()">Cadastre-se</a></p>
        </div>

        <div id="signup-form" class="box hidden">
            <h2>Criar Conta</h2>
            <input type="text" id="signup-username" placeholder="Escolha um Username">
            <input type="email" id="signup-email" placeholder="Seu email">
            <input type="password" id="signup-password" placeholder="Crie uma senha (min 6 digitos)">
            <button onclick="fazerCadastro()">Cadastrar</button>
            <p>Já tem conta? <a href="#" onclick="toggleForms()">Voltar para Login</a></p>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <div class="box">
            <h2>Bem-vindo, <span id="user-display">usuário</span>!</h2>
            <p>Seu ID: <span id="id-display">...</span></p>
            <hr>
            <h3>Testar Segurança (RLS)</h3>
            <p>Como você está logado, o botão abaixo deve funcionar e trazer seus decks.</p>
            <button onclick="buscarDecks()">Buscar Meus Decks (Console)</button>
            <br><br>
            <button class="secondary" onclick="fazerLogout()">Sair (Logout)</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // --- 1. CONFIGURAÇÃO (COLOQUE SUAS CHAVES AQUI) ---
        const SUPABASE_URL = 'https://wthlsjmxbhtnwacklwci.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_47AI3d72L4BwpftH8YL59A_C_4drqpw'; 
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. GERENCIAMENTO DE ESTADO DA TELA ---
        
        // Essa função mágica roda sempre que o usuário loga ou desloga
        _supabase.auth.onAuthStateChange((event, session) => {
            if (session) {
                // Usuário está logado
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('app-container').classList.remove('hidden');
                
                // Mostra dados na tela
                document.getElementById('user-display').innerText = session.user.email;
                document.getElementById('id-display').innerText = session.user.id;
                console.log("Usuário logado:", session.user);
            } else {
                // Usuário NÃO está logado
                document.getElementById('auth-container').classList.remove('hidden');
                document.getElementById('app-container').classList.add('hidden');
                console.log("Usuário desconectado.");
            }
        });

        // Alternar entre Login e Cadastro
        function toggleForms() {
            document.getElementById('login-form').classList.toggle('hidden');
            document.getElementById('signup-form').classList.toggle('hidden');
        }

        // --- 3. FUNÇÕES DE AÇÃO ---

        async function fazerLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) alert("Erro no login: " + error.message);
        }

        async function fazerCadastro() {
            const username = document.getElementById('signup-username').value;
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;

            // AQUI O PULO DO GATO: Enviamos o username dentro de 'options' -> 'data'
            // O Trigger que criamos no SQL vai ler isso e salvar na tabela profiles.
            const { data, error } = await _supabase.auth.signUp({
                email: email,
                password: password,
                options: {
                    data: {
                        username: username 
                    }
                }
            });

            if (error) {
                alert("Erro ao cadastrar: " + error.message);
            } else {
                alert("Cadastro realizado! Verifique seu email para confirmar a conta.");
            }
        }

        async function fazerLogout() {
            const { error } = await _supabase.auth.signOut();
            if (error) alert(error.message);
        }

        // Função de teste para provar que a conexão funciona
        async function buscarDecks() {
            // Tenta buscar decks. Graças ao RLS, só virão os SEUS decks.
            const { data, error } = await _supabase.from('decks').select('*');
            
            if (error) {
                console.error(error);
                alert("Erro ao buscar decks");
            } else {
                console.log("Seus Decks:", data);
                alert(`Sucesso! Encontrei ${data.length} decks no banco.`);
            }
        }

    </script>
</body>
</html>
